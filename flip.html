<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Cover Flip — DS Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020508;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ────────────────────────────────────────────────
       BOOK WRAPPER — gives perspective + size
    ──────────────────────────────────────────────── */
    .book {
      position: relative;
      width: 220px;
      height: 300px;
      border-radius: 10px;
      background-color: #111;          /* pages visible from the side */
      box-shadow: 1px 1px 12px #000;
      transform-style: preserve-3d;
      perspective: 2000px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    /* inner text shown on open (the "pages" of the book) */
    .book-inner-text {
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      padding: 18px;
      text-align: center;
      user-select: none;
    }

    /* ────────────────────────────────────────────────
       COVER — sits on top, rotates open on hover
    ──────────────────────────────────────────────── */
    .cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      cursor: pointer;

      /* cover appearance */
      background: linear-gradient(145deg, #0a0c10 60%, #0c1a22);
      border: 2px solid #0FF0FC;
      box-shadow: 1px 1px 12px #000, 0 0 18px rgba(0,243,255,0.2);

      /* flex centre its contents */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

      /* flip pivot is the left spine */
      transform-origin: left center;
      transition: transform 0.5s cubic-bezier(0.645, 0.045, 0.355, 1),
                  box-shadow 0.5s;
    }

    /* open on hover */
    .book:hover .cover {
      transform: rotateY(-80deg);
      box-shadow: 4px 4px 30px rgba(0,0,0,0.8), 0 0 30px rgba(0,243,255,0.15);
    }

    /* cover icon */
    .cover-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    /* cover title */
    .cover-title {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #fff;
      text-align: center;
      padding: 0 14px;
      text-shadow: 0 0 8px rgba(0,243,255,0.5);
    }

    /* thin cyan rule */
    .cover-rule {
      width: 60px;
      height: 2px;
      background: #0FF0FC;
      border-radius: 2px;
      box-shadow: 0 0 6px #0FF0FC;
    }

    /* blinking hint */
    .cover-hint {
      font-size: 9px;
      letter-spacing: 3px;
      color: #FCEE09;
      text-transform: uppercase;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1;    }
    }

    /* ────────────────────────────────────────────────
       CAPTION below the book
    ──────────────────────────────────────────────── */
    .caption {
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 3px;
      color: #444;
      text-align: center;
    }

    /* wrapper for book + caption */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="book">
      <!-- Pages (visible after cover opens) -->
      <div class="book-inner-text">
        Hover to open<br/>the book cover
      </div>

      <!-- 3-D rotating cover -->
      <div class="cover">
        <span class="cover-icon">📖</span>
        <div class="cover-title">DS VISUALIZER</div>
        <div class="cover-rule"></div>
        <span class="cover-hint">Hover to open</span>
      </div>
    </div>

    <p class="caption">BOOK COVER FLIP · Uiverse.io / eslam-hany</p>
  </div>
</body>
</html>
